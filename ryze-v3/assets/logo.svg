<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 48" fill="none">
  <!-- Wordmark "ryze" in rounded modern sans -->
  <text x="0" y="34" font-family="'Fraunces','Georgia',serif" font-size="38" font-weight="600" fill="#0B0B0B" letter-spacing="-1">
    <tspan>ry</tspan><tspan font-weight="700">z</tspan><tspan>e</tspan>
  </text>
  <!-- Red smile curve under the Z -->
  <path d="M62 38 C66 44, 78 44, 82 38" stroke="#E63946" stroke-width="2.8" stroke-linecap="round" fill="none" class="smile-path"/>
  <!-- "aligners" curved around the e -->
  <path id="curve" d="M120 18 C138 14, 148 20, 146 34 C144 42, 132 46, 122 44" fill="none"/>
  <text font-family="'Inter','Helvetica',sans-serif" font-size="7.5" fill="#1E7FBF" letter-spacing="1.2">
    <textPath href="#curve">aligners ®</textPath>
  </text>
</svg>