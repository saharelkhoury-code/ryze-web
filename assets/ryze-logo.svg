<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 96" role="img" aria-label="ryze aligners">
  <!-- Wordmark: r y z e in lowercase rounded blue -->
  <g font-family="'Century Gothic','Futura','Avenir',system-ui,sans-serif" font-weight="700" fill="#1B7FBF">
    <text x="4"   y="70" font-size="78" letter-spacing="-4">r</text>
    <text x="36"  y="80" font-size="78" letter-spacing="-4">y</text>
    <text x="78"  y="70" font-size="82" letter-spacing="-4" style="font-weight:800;">Z</text>
    <text x="128" y="70" font-size="78" letter-spacing="-4">e</text>
  </g>
  <!-- Red smile curve beneath the Z -->
  <path d="M82 74 Q102 92 122 74" stroke="#E8334A" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- "aligners" curved around the e, and ® -->
  <defs>
    <path id="aligners-curve" d="M 176 36 a 40 40 0 0 1 0 58" />
  </defs>
  <text font-family="'Century Gothic','Futura',sans-serif" font-size="15" font-weight="700" fill="#1B7FBF" letter-spacing="1.5">
    <textPath href="#aligners-curve" startOffset="0">aligners</textPath>
  </text>
  <circle cx="198" cy="92" r="6.5" stroke="#E8334A" stroke-width="1.6" fill="none"/>
  <text x="198" y="96" text-anchor="middle" font-family="serif" font-size="9" font-weight="700" fill="#E8334A">R</text>
</svg>
